version: '3.9'

services:
  backend:
    build: ./backend
    container_name: tankatus_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_PATH: /data/tankatus.db
      JWT_SECRET: tankatus_jwt_secret_change_me
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    volumes:
      - tankatus_data:/data
    ports:
      - "3001:3001"

  frontend:
    image: nginx:alpine
    container_name: tankatus_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

volumes:
  tankatus_data:
